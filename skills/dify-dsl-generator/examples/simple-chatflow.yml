app:
  description: 'テキストを受け取り、LLMで処理して回答するシンプルなChatflowの最小構成例'
  icon: 🤖
  icon_background: '#FFEAD5'
  mode: advanced-chat
  name: シンプル要約Chatflow
  use_icon_as_answer_icon: false
dependencies: []
kind: app
version: 0.3.0
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - image
      allowed_file_upload_methods:
      - local_file
      - remote_url
      enabled: false
      fileUploadConfig:
        audio_file_size_limit: 500
        batch_count_limit: 5
        file_size_limit: 15
        image_file_size_limit: 100
        video_file_size_limit: 500
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: ''
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    edges:
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: start
        targetType: llm
      id: 1700000000001-source-1700000000002-target
      source: '1700000000001'
      sourceHandle: source
      target: '1700000000002'
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: llm
        targetType: answer
      id: 1700000000002-source-answer-target
      source: '1700000000002'
      sourceHandle: source
      target: answer
      targetHandle: target
      type: custom
      zIndex: 0
    nodes:
    - data:
        desc: ''
        selected: false
        title: 開始
        type: start
        variables:
        - label: 入力テキスト
          max_length: 2000
          options: []
          required: true
          type: paragraph
          variable: query
      height: 90
      id: '1700000000001'
      position:
        x: 80
        y: 282
      positionAbsolute:
        x: 80
        y: 282
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        context:
          enabled: false
          variable_selector: []
        desc: ''
        model:
          completion_params:
            temperature: 0.7
            max_tokens: 2000
          mode: chat
          name: claude-sonnet-4-6
          provider: anthropic
        prompt_template:
        - id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
          role: system
          text: あなたは優秀なアシスタントです。ユーザーの入力を簡潔にまとめて回答してください。
        - id: b2c3d4e5-f6a7-8901-bcde-f12345678901
          role: user
          text: '{{#1700000000001.query#}}'
        selected: false
        title: LLM処理
        type: llm
        variables: []
        vision:
          enabled: false
      height: 90
      id: '1700000000002'
      position:
        x: 380
        y: 282
      positionAbsolute:
        x: 380
        y: 282
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        answer: '{{#1700000000002.text#}}'
        desc: ''
        selected: false
        title: 回答
        type: answer
        variables: []
      height: 143
      id: answer
      position:
        x: 680
        y: 282
      positionAbsolute:
        x: 680
        y: 282
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    viewport:
      x: 0
      y: 0
      zoom: 1
